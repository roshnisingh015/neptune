<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Neptune Documents</title>
        <link rel="stylesheet" href="./style.css" />
    </head>
    <body>
        <div class="container">
            <div class="sidebar">
                <div class="side-wrap">
                    <img src="./assets/main-logo.svg" width="168px" height="31px" alt="main-logo" />

                    <div class="user-profile-card">
                        <div class="profile-wrapper">
                            <img src="./assets/profile-image.svg" alt="profile-image" />
                            <div>
                                <p class="user-name">Jessica Thompson</p>
                                <p class="user-role">Primary User</p>
                            </div>
                        </div>
                        <img src="./assets/down-arrow.svg" alt="down-arrow" />
                    </div>

                    <div class="menu">
                        <div class="menu-items">
                            <img src="./assets/home.svg" alt="home-icon" />
                            <p>Home</p>
                        </div>
                        <div class="menu-items active">
                            <img src="./assets/document.svg" alt="document-ligo" />
                            <p>Documents</p>
                        </div>
                        <div class="menu-items">
                            <img src="./assets/chat.svg" alt="chat-logo" />
                            <p>Chat with Neptune</p>
                        </div>
                        <div class="menu-items">
                            <img src="./assets/help.svg" alt="help-logo" />
                            <p>Help</p>
                        </div>
                        <div class="menu-items">
                            <img src="./assets/settings.svg" alt="settings-logo" />
                            <p>Settings</p>
                        </div>
                    </div>
                </div>

                <div class="contact">
                    <img src="./assets/phone.svg" height="27px" width="27px" alt="phone-icon" />
                    <p class="trouble-heading">Having Trouble?</p>
                    <p class="trouble-desc">Feel free to contact us and we will always help you through the process</p>
                    <button class="primary-btn">Contact us</button>
                </div>
            </div>

            <div class="main">
                <div class="main-top">
                    <p class="home">Home</p>
                    <img src="./assets/right-arrow.svg" alt="right-arrow-icon" />
                    <p class="documents">Documents</p>
                </div>

                <div class="main-center">
                    <p class="center-document">My Documents</p>
                    <div class="addLogo">
                        <img
                            src="./assets/add_document_button.png"
                            alt="add-document-logo"
                            class="add-document-btn"
                            id="addDocumentBtn"
                        />
                        <div class="search-bar">
                            <input type="search" placeholder="Search documents" />
                            <img src="./assets/search-bar.svg" alt="search-bar-logo" />
                        </div>
                    </div>
                </div>
                <div class="main-bottom">
                    <table id="documentTable">
                        <tr>
                            <th>
                                <div class="doc-checkbox">
                                    <input type="checkbox" />
                                    <img src="./assets/down-arrow1.svg" alt="down-arrow" />
                                </div>
                            </th>
                            <th class="table-head">Document Name</th>
                            <th class="table-head">Status</th>
                            <th class="table-head">Last Modified</th>
                            <th></th>
                        </tr>
                    </table>
                </div>
            </div>
        </div>

        <dialog id="addDocumentDialog">
            <img src="./assets/close-icon.png" alt="close-icon" class="close-icon" id="closeIcon" />

            <div class="popup">
                <h2>Add Document</h2>

                <div>
                    <label>Document Name</label>
                    <input type="text" placeholder="Enter document name" />
                </div>

                <div>
                    <label>Status</label>
                    <select>
                        <option value="">Select status</option>
                        <option value="needs-signing">Needs Signing</option>
                        <option value="pending">Pending</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>

                <button id="closeModalBtn" class="addBtn">Add</button>
            </div>
        </dialog>

        <script src="./app.js"></script>
    </body>
</html>
